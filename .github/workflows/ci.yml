name: CI

on:
  push:
    branches:
      - main
      - Go-Implementation
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
      - run: go test ./...
      - run: go build ./...
